<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #ffafbd, #ffc3a0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        #countdown-screen, #birthday-screen {
            text-align: center;
            z-index: 10;
        }

        .hidden { display: none !important; }

        h1 { font-size: 3rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }

        .timer {
            display: flex;
            gap: 20px;
            font-size: 2rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn {
            background: white;
            color: #ff4d6d;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .media-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        img, video {
            max-width: 90%;
            max-height: 350px;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="countdown-screen">
        <h1 id="headline">Wait for it...</h1>
        <div id="timer" class="timer">
            <div id="days">00</div><span>:</span>
            <div id="hours">00</div><span>:</span>
            <div id="minutes">00</div><span>:</span>
            <div id="seconds">00</div>
        </div>
        <button id="magic-btn" class="btn hidden" onclick="startSurprise()">OPEN YOUR GIFT 🎁</button>
    </div>

    <div id="birthday-screen" class="hidden">
        <h1 style="font-size: 4rem;">HAPPY BIRTHDAY! ❤️</h1>
        <div class="media-container">
            <img src="queen.jpg" alt="Your Photo">
            <video id="wish-video" controls>
                <source src="wish.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const targetDate = new Date('April 17, 2026 00:00:00').getTime();

        const timerInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').classList.add('hidden');
                document.getElementById('headline').innerText = "It's Time!";
                document.getElementById('magic-btn').classList.remove('hidden');
            } else {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);

        function startSurprise() {
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('birthday-screen').classList.remove('hidden');
            
            // Start Video
            const video = document.getElementById('wish-video');
            video.play();

            // Confetti
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });

            // Loud Voice
            const msg = new SpeechSynthesisUtterance("HAPPY BIRTHDAY!");
            msg.volume = 1;
            window.speechSynthesis.speak(msg);
        }

        // Floating Hearts
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 300);
    </script>
</body>
</html>
