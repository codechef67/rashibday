<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pink: #ff4d6d; --light-pink: #ffafbd; }
        body { margin: 0; background: var(--light-pink); font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #fff; }
        #main-container { text-align: center; z-index: 10; width: 90%; max-width: 400px; }
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 30px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn { background: #fff; color: var(--pink); border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .hidden { display: none; }
        img { width: 100%; border-radius: 20px; border: 5px solid white; margin-bottom: 15px; }
        video { width: 100%; border-radius: 20px; background: #000; }
        .heart { position: absolute; color: var(--pink); animation: fly 4s linear infinite; pointer-events: none; }
        @keyframes fly { 0% { transform: translateY(100vh) scale(0); opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="countdown-section" class="glass">
            <h1 id="status">Wait for it...</h1>
            <div id="timer" style="font-size: 2rem; font-weight: bold; margin: 20px 0;">00 : 00 : 00</div>
            <button id="gift-btn" class="btn hidden" onclick="reveal()">OPEN YOUR GIFT 🎁</button>
        </div>

        <div id="bday-section" class="hidden">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">HAPPY BIRTHDAY! ❤️</h1>
            <img src="queen.jpg" alt="Birthday Queen">
            <video id="wish-video" playsinline controls>
                <source src="wish.mp4" type="video/mp4">
            </video>
            <p style="margin-top: 10px; font-style: italic;">Turn up the volume! 🔊</p>
        </div>
    </div>

    <script>
        const target = new Date('April 17, 2026 00:00:00').getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('timer').classList.add('hidden');
                document.getElementById('status').innerText = "It's Your Day!";
                document.getElementById('gift-btn').classList.remove('hidden');
            } else {
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('timer').innerText = `${h}h : ${m}m : ${s}s`;
            }
        };

        setInterval(updateTimer, 1000);
        updateTimer();

        function reveal() {
            document.getElementById('countdown-section').classList.add('hidden');
            document.getElementById('bday-section').classList.remove('hidden');
            
            // Confetti
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // Video Play Logic
            const v = document.getElementById('wish-video');
            v.play().catch(() => console.log("User must interact to play audio"));

            // Voice Shout
            const msg = new SpeechSynthesisUtterance("HAPPY BIRTHDAY!");
            window.speechSynthesis.speak(msg);

            // Floating Hearts
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
